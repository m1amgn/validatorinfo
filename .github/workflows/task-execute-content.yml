name: Agent Task Execution (Content)
on:
  issues:
    types: [labeled]

concurrency:
  group: agent-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  execute:
    if: >-
      github.event.label.name == 'agent:seo-vi' ||
      github.event.label.name == 'agent:seo-cw3' ||
      github.event.label.name == 'agent:biz-dev'
    runs-on: [self-hosted, content]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          clean: false

      - name: Create branch
        id: branch
        run: |
          BRANCH="agent/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Install dependencies and generate Prisma
        timeout-minutes: 30
        run: |
          if [ -f node_modules/.yarn-integrity ]; then
            echo "node_modules cached, skipping install"
          else
            yarn install --frozen-lockfile || yarn install
          fi
          npx prisma generate 2>/dev/null || true
          npx prisma generate --schema=prisma/events/schema.prisma 2>/dev/null || true
          printf "DATABASE_URL=%s\nEVENTS_DATABASE_URL=%s\n" "$DATABASE_URL" "$EVENTS_DATABASE_URL" > .env.local

      - name: Determine role and execute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: task-execute-content
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          LABELS=$(gh issue view $ISSUE_NUMBER --json labels -q '.labels[].name')
          BODY=$(gh issue view $ISSUE_NUMBER --json body -q '.body')

          PROMPT_FILE=".claude/agents/seo-vi.md"
          ROLE="seo-vi"
          for R in seo-vi seo-cw3 biz-dev; do
            if echo "$LABELS" | grep -q "agent:$R"; then
              PROMPT_FILE=".claude/agents/${R}.md"
              ROLE="$R"
              break
            fi
          done

          SYSTEM=$(cat "$PROMPT_FILE")

          ./agents-tools/run-agent.sh \
            --agent "$ROLE" --role "content" --trigger issue \
            --issue "$ISSUE_NUMBER" \
            --prompt-file "$PROMPT_FILE" \
            -- "${SYSTEM}

          TASK: ${ISSUE_TITLE}
          DETAILS: ${BODY}

          Instructions:
          1. Read your context files listed in the agent prompt before starting
          2. Read CLAUDE.md for project conventions
          3. Query the database via Prisma for real data to back your content
          4. Verify data freshness — if data looks stale, note it or skip that data point
          5. Create the content as specified in the task:
             - Blog articles: write to content/blog/ as markdown
             - Social posts: write to content/social/ as markdown with platform prefix (twitter-, telegram-, discord-)
             - SEO content: write to content/seo/ as markdown
          6. Follow the Three-Level Autonomy from your prompt:
             - Full autonomy (DB facts): commit directly
             - Partial autonomy (opinions): note in PR body that review is needed
             - Issue only (predictions): note in PR body that approval is required before publishing
          7. Write a PR description to .agent-pr-body.md (this file is gitignored, do NOT commit it) with this format:
             **What:** [1 sentence]
             **Why:** Closes #${ISSUE_NUMBER}
             **Content type:** [blog/twitter/telegram/discord/seo]
             **Data sources:** [which DB queries or external sources used]
             **Autonomy level:** [full/partial/issue-only — and why]
             **Draft:** [paste the final content here for review]
          8. Commit content files with message: content: ${ISSUE_TITLE} (#${ISSUE_NUMBER})
             Do NOT add any Co-Authored-By trailer to commit messages.
             Do NOT commit .agent-pr-body.md
          9. Do NOT create PR, it will be created in the next step
          10. Do NOT use pkill, killall, or any command that kills processes by name"

          if [ $? -ne 0 ]; then
            echo "Agent failed. See monitoring.db for details."
            exit 1
          fi

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          if [ "$(git log origin/updates/dev-update..$BRANCH --oneline | wc -l)" -eq 0 ]; then
            echo "No commits to push"
            exit 1
          fi
          git push origin "$BRANCH"

          # Use agent-generated PR body if available, otherwise fallback
          if [ -f .agent-pr-body.md ]; then
            PR_BODY=$(cat .agent-pr-body.md)
          else
            PR_BODY="Closes #${ISSUE_NUMBER}

          Auto-generated by Content Agent."
          fi

          gh pr create \
            --title "content: ${ISSUE_TITLE}" \
            --body "$PR_BODY" \
            --base updates/dev-update \
            --head "$BRANCH"
